<html>
  <head>
    <meta charset="utf-8" />
    <title>Recipes 4 U</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400&family=Fredoka+One&family=Questrial&family=Staatliches&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="public/style.css" />
    <script defer src="https://kit.fontawesome.com/e918d10e90.js" crossorigin="anonymous"></script>
    <script defer src="public/helpers.js"></script>
    <script defer src="public/script.js"></script>
  </head>
  <body>

    <header>
      <h1 id="appTitle">🍜Recipes 4 U🍜</h1>
    </header>

    <form id="genreForm">
      <label for="categoryDropdown">Choose a category:</label>
      <select id="categoryDropdown"></select>
    </form>

    <div id="cookBtnDiv">
      <button id="cookBtn">Press to cook!</button>
    </div>

    <div id="recipeInfo">
      <div id="recipePhoto"></div>
      <div id="recipeText"></div>
    </div>


    <div id="searchResults"></div>
    <button id="favoriteBtn" hidden>Add to Favorites</button>

<h2>Favorites</h2>
<ul id="favoritesList"></ul>

  </body>
</html>
